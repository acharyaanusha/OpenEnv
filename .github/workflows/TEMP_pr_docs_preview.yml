name: TEMP PR Docs Preview

# Temporary workflow to force doc preview on PR #739.
# Remove after merging docs/migrate-to-hf-doc-builder (build_pr_documentation.yml
# and upload_pr_documentation.yml will take over once on main).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.draft == false
    uses: huggingface/doc-builder/.github/workflows/build_pr_documentation.yml@2430c1ec91d04667414e2fa31ecfc36c153ea391  # main
    with:
      commit_sha: ${{ github.event.pull_request.head.sha }}
      pr_number: ${{ github.event.number }}
      package: openenv
      version_tag_suffix: ""

  upload:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: doc-build-artifact
          path: build_dir

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync docs to HF bucket
        env:
          HF_TOKEN: ${{ secrets.HF_DOC_BUILD_PUSH }}
        run: hf sync "./build_dir/openenv" "hf://buckets/hf-doc-build/doc-dev/openenv"

      - name: Find existing PR comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.number }}
          comment-author: github-actions[bot]
          body-includes: docs for this PR

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.number }}
          edit-mode: replace
          body: |
            The docs for this PR live at:
            https://moon-ci-docs.huggingface.co/docs/openenv/pr_${{ github.event.number }}/en/index

            (updated with commit ${{ github.event.pull_request.head.sha }})
